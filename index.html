        <main style="max-width: 48rem; margin: 2rem auto; padding: 0 1.5rem; font-family: system-ui, sans-serif; color: #1a1a2e; line-height: 1.6">
          <h1>SeatFinder — Wedding Seating Chart with Groups, Blacklists &amp; Auto Arrange</h1>
          <p>
            SeatFinder is a free online seating planner for weddings, receptions, banquets, and
            events. Organize guest groups and households, set seating blacklists so certain guests
            must not sit at the same table or next to each other, and let the built-in seating
            algorithm auto-arrange an optimal floor plan.
          </p>
          <h2>Guest groups &amp; seating rules</h2>
          <ul>
            <li>Guest groups and households — keep families and friend groups at the same table</li>
            <li>Not same table blacklist — guests who must never share a table</li>
            <li>Not next to each other blacklist — guests who must not sit side by side</li>
            <li>Prefer together — soft rules for couples and close friends</li>
            <li>Lock VIP seats (like the couple at the head table) before auto-arrange runs</li>
          </ul>
          <h2>Smart seating algorithm</h2>
          <p>
            Click Auto-arrange and SeatFinder&apos;s seating optimizer searches thousands of
            arrangements to find a good plan that respects your groups, blacklists, and locked
            seats. Reseat unlocked reshuffles only the guests you haven&apos;t pinned down.
          </p>
          <h2>More features</h2>
          <ul>
            <li>Drag-and-drop wedding seating chart maker with visual floor plan</li>
            <li>Round tables, rectangular tables, and head tables</li>
            <li>Export your seating plan as PNG or JSON</li>
            <li>No account required — saves in your browser</li>
          </ul>
          <p>Please enable JavaScript to use the interactive seating planner.</p>
